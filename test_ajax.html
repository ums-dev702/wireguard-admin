<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikroTik Script Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">MikroTik Script Generation Test</h1>
        
        <div class="bg-white p-6 rounded-lg shadow mb-4">
            <h2 class="text-lg font-semibold mb-4">Test AJAX Request</h2>
            <button onclick="testMikroTikScript()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Test MikroTik Script Generation
            </button>
        </div>
        
        <div id="result" class="bg-gray-900 text-green-400 p-4 rounded-lg font-mono text-sm hidden">
            <h3 class="text-white mb-2">Result:</h3>
            <pre id="output"></pre>
        </div>
        
        <div id="error" class="bg-red-900 text-red-400 p-4 rounded-lg font-mono text-sm hidden">
            <h3 class="text-white mb-2">Error:</h3>
            <pre id="errorOutput"></pre>
        </div>
    </div>

    <script>
        async function testMikroTikScript() {
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const output = document.getElementById('output');
            const errorOutput = document.getElementById('errorOutput');
            
            // Hide previous results
            resultDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');
            
            try {
                console.log('Starting MikroTik script test...');
                
                // Test parameters - adjust these based on your data
                const peerId = 1;
                const interface = 'wg0';
                const url = `app/backend/generate_mikrotik_script.php?peer_id=${peerId}&interface=${encodeURIComponent(interface)}`;
                
                console.log('Testing URL:', url);
                
                const response = await fetch(url);
                console.log('Response status:', response.status);
                console.log('Response headers:', Object.fromEntries(response.headers.entries()));
                
                const text = await response.text();
                console.log('Response text length:', text.length);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}\n${text}`);
                }
                
                if (text.startsWith('# Error:')) {
                    errorOutput.textContent = text;
                    errorDiv.classList.remove('hidden');
                } else {
                    output.textContent = text;
                    resultDiv.classList.remove('hidden');
                }
                
            } catch (error) {
                console.error('Error:', error);
                errorOutput.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
